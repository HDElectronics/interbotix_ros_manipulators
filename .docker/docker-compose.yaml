# Example command:
#   Humble on a Nvidia system:
#   docker compose run gpu
#   Rolling without discrete graphics:
#   docker compose run cpu

services:
  cpu:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    image: interbotixrosmanipulators:humble
    container_name: moveit2_container
    privileged: true
    network_mode: host
    command: /bin/bash
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $XAUTHORITY:/root/.Xauthority
    environment:
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
  gpu:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    image: interbotixrosmanipulators:humble
    container_name: moveit2_container
    runtime: nvidia
    privileged: true
    network_mode: host
    command: /bin/bash
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - $XAUTHORITY:/root/.Xauthority
    environment:
      QT_X11_NO_MITSHM: 1
      DISPLAY: $DISPLAY
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      LIBGL_ALWAYS_INDIRECT: 0
